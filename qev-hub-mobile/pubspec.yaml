name: qev_hub_mobile
description: "QEV Hub - Qatar Electric Vehicle Marketplace Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-16.0.dev

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^14.0.0

  # Supabase
  supabase_flutter: ^2.3.4

  # Networking
  dio: ^5.4.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.1

  # Storage
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1

  # Internationalization
  intl: ^0.19.0

  # Validation
  regexpattern: ^2.5.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Maps & Location
  flutter_map: ^7.0.2
  geolocator: ^12.0.0
  url_launcher: ^6.3.0
  latlong2: ^0.9.1

  # Environment
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
