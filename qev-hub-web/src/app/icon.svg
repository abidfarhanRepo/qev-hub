<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="electricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A994;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5CEADD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C860;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="60" cy="60" r="56" fill="#0A192F"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#electricGrad)" stroke-width="2" opacity="0.7"/>

  <!-- Inner hexagon -->
  <polygon points="60,16 98,38 98,82 60,104 22,82 22,38"
           fill="none" stroke="url(#electricGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Lightning bolt -->
  <g transform="translate(60, 60)" filter="url(#glow)">
    <path d="M -5,-30 L -20,5 L -3,5 L -9,32 L 22,-7 L 5,-7 L 13,-30 Z"
          fill="url(#boltGrad)"/>
  </g>

  <!-- Gold accent arcs -->
  <path d="M 20,100 A 50,50 0 0,1 10,70" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 100,20 A 50,50 0 0,1 110,50" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
</svg>